<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Presenze</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f3; min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 2rem 1rem;
  }
  .app { width: 100%; max-width: 460px; }

  .card {
    background: #fff; border: 1px solid #e5e5e2;
    border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 1rem;
  }

  label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
  input[type="text"], input[type="url"] {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid #ddd; border-radius: 10px;
    margin-bottom: 12px; outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #1D9E75; }

  .btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
    margin-top: 4px;
  }
  .btn-primary { background: #1D9E75; color: #fff; }
  .btn-primary:hover { background: #0F6E56; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary {
    background: transparent; color: #333;
    border: 1px solid #ddd; margin-top: 8px;
  }
  .btn-secondary:hover { background: #f5f5f3; }

  .checkin-btn {
    width: 100%; padding: 24px; border: none;
    border-radius: 14px; background: #1D9E75;
    color: #fff; font-size: 24px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .checkin-btn:hover { background: #0F6E56; }
  .checkin-btn:active { transform: scale(0.98); }
  .checkin-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

  .status {
    text-align: center; font-size: 14px; padding: 10px 14px;
    border-radius: 10px; margin-top: 12px; display: none;
  }
  .status.show { display: block; }
  .status.success { background: #E1F5EE; color: #085041; border: 1px solid #5DCAA5; }
  .status.error   { background: #FCEBEB; color: #7a1f1f; border: 1px solid #F09595; }
  .status.loading { background: #f5f5f3; color: #666; }

  .clock { text-align: center; padding: 1rem 0 1.5rem; }
  .clock .time { font-size: 40px; font-weight: 700; color: #111; letter-spacing: -0.03em; }
  .clock .date { font-size: 15px; color: #888; margin-top: 2px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .tab {
    flex: 1; padding: 8px; font-size: 13px; cursor: pointer;
    background: transparent; border: 1px solid #e5e5e2;
    border-radius: 10px; color: #888; font-family: inherit;
    transition: all 0.12s;
  }
  .tab.active { background: #f5f5f3; border-color: #ccc; color: #111; font-weight: 600; }

  .log-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f0f0ee; font-size: 14px;
  }
  .log-item:last-child { border-bottom: none; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #9FE1CB; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 600;
    color: #085041; flex-shrink: 0;
  }
  .log-name { font-weight: 600; color: #111; }
  .log-sub  { font-size: 12px; color: #888; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">

  <!-- SETUP -->
  <div id="sec-setup">
    <div class="card">
      <div class="card-title">configurazione</div>
      <label>URL Apps Script (termina con /exec)</label>
      <input type="url" id="script-url" placeholder="https://script.google.com/macros/s/.../exec" />
      <button class="btn btn-primary" onclick="saveConfig()">Salva e continua</button>
    </div>
  </div>

  <!-- APP -->
  <div id="sec-app" class="hidden">
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('checkin',0)">Check-in</button>
        <button class="tab" onclick="switchTab('log',1)">Presenze</button>
        <button class="tab" onclick="switchTab('settings',2)">Impostazioni</button>
      </div>

      <!-- CHECK-IN -->
      <div id="tab-checkin">
        <div class="clock">
          <div class="time" id="clock">--:--</div>
          <div class="date" id="datedisp"></div>
        </div>
        <label>Il tuo nome</label>
        <input type="text" id="nome" placeholder="es. Mario Rossi" style="margin-bottom:18px;" />
        <button class="checkin-btn" id="btn-checkin" onclick="doCheckin()">Sono presente</button>
        <div class="status" id="status-checkin"></div>
      </div>

      <!-- LOG -->
      <div id="tab-log" class="hidden">
        <div id="log-list">
          <p style="color:#888;font-size:14px;text-align:center;padding:1rem 0;">Nessuna presenza ancora in questa sessione.</p>
        </div>
      </div>

      <!-- SETTINGS -->
      <div id="tab-settings" class="hidden">
        <label>URL Apps Script</label>
        <input type="url" id="edit-url" />
        <button class="btn btn-primary" onclick="updateUrl()">Aggiorna URL</button>
        <button class="btn btn-secondary" onclick="resetApp()">Riconfigura da capo</button>
      </div>
    </div>
  </div>

</div>

<script>
let config = { url: "https://script.google.com/macros/s/AKfycbwh_5KE_cC8g6_maF259MM2PXmYI3rb9MyvZvaO3Sx6tEJHKJZQSiQdJ1pL3YF6MocJEw/exec" };
let sessionLog = [];

try {
  const s = localStorage.getItem("presenza_app");
  if (s) { config = JSON.parse(s); if (config.url) showApp(); }
} catch(e) {}

function tick() {
  const now = new Date();
  const el = document.getElementById("clock");
  if (el) el.textContent = String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
  const days = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
  const months = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  const d = document.getElementById("datedisp");
  if (d) d.textContent = days[now.getDay()] + " " + now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
}
tick(); setInterval(tick, 10000);

function showApp() {
  document.getElementById("sec-setup").classList.add("hidden");
  document.getElementById("sec-app").classList.remove("hidden");
  document.getElementById("edit-url").value = config.url || "";
}

function saveConfig() {
  const url = document.getElementById("script-url").value.trim();
  if (!url.startsWith("https://script.google.com")) {
    alert("URL non valido."); return;
  }
  config = { url };
  try { localStorage.setItem("presenza_app", JSON.stringify(config)); } catch(e) {}
  showApp();
}

async function doCheckin() {
  const nome = document.getElementById("nome").value.trim();
  if (!nome) { showStatus("Inserisci il tuo nome.", "error"); return; }

  const btn = document.getElementById("btn-checkin");
  btn.disabled = true;
  showStatus("Invio in corso...", "loading");

  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const dataStr = pad(now.getDate())+"/"+pad(now.getMonth()+1)+"/"+now.getFullYear();
  const oraStr  = pad(now.getHours())+":"+pad(now.getMinutes())+":"+pad(now.getSeconds());

  try {
    const url = config.url + "?action=checkin&nome=" + encodeURIComponent(nome);
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.ok) {
      sessionLog.unshift({ nome, data: dataStr, ora: oraStr });
      renderLog();
      showStatus("Presenza registrata per " + nome + " alle " + oraStr, "success");
      document.getElementById("nome").value = "";
    } else {
      showStatus("Errore dal server. Riprova.", "error");
    }
  } catch(err) {
    showStatus("Errore: " + err.message, "error");
  }

  setTimeout(() => {
    document.getElementById("status-checkin").classList.remove("show");
    btn.disabled = false;
  }, 4000);
}

function renderLog() {
  const el = document.getElementById("log-list");
  if (!sessionLog.length) {
    el.innerHTML = '<p style="color:#888;font-size:14px;text-align:center;padding:1rem 0;">Nessuna presenza ancora.</p>';
    return;
  }
  el.innerHTML = sessionLog.map(r => {
    const initials = r.nome.split(" ").map(w => w[0]).slice(0,2).join("").toUpperCase();
    return `<div class="log-item">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar">${initials}</div>
        <div>
          <div class="log-name">${r.nome}</div>
          <div class="log-sub">${r.data}</div>
        </div>
      </div>
      <div class="log-sub">${r.ora}</div>
    </div>`;
  }).join("");
}

function showStatus(msg, type) {
  const el = document.getElementById("status-checkin");
  el.textContent = msg;
  el.className = "status show " + type;
}

function switchTab(tab, idx) {
  ["checkin","log","settings"].forEach((t,i) => {
    const el = document.getElementById("tab-"+t);
    if (t === tab) el.classList.remove("hidden");
    else el.classList.add("hidden");
    document.querySelectorAll(".tab")[i].classList.toggle("active", i === idx);
  });
}

function updateUrl() {
  const url = document.getElementById("edit-url").value.trim();
  if (!url) { alert("Inserisci l'URL."); return; }
  config = { url };
  try { localStorage.setItem("presenza_app", JSON.stringify(config)); } catch(e) {}
  alert("URL aggiornato!");
}

function resetApp() {
  if (!confirm("Riconfigurare da capo?")) return;
  config = { url: "" };
  try { localStorage.removeItem("presenza_app"); } catch(e) {}
  document.getElementById("sec-app").classList.add("hidden");
  document.getElementById("sec-setup").classList.remove("hidden");
  document.getElementById("script-url").value = "";
}
</script>
</body>
</html>
